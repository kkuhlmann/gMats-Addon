name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from TOC
        id: version
        run: |
          version=$(grep -oP '## Version: \K.*' gMats/gMats.toc | tr -d '[:space:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Zip gMats directory
        run: zip -r gMats-${{ steps.version.outputs.version }}.zip gMats/

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: gMats ${{ steps.version.outputs.version }}
          files: gMats-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Delete previous latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: gMats Latest
          files: gMats-${{ steps.version.outputs.version }}.zip
          body: |
            Latest build of gMats (v${{ steps.version.outputs.version }}).

            This release is automatically updated on every push to main.
          make_latest: true
